services:
  # 1. Cơ sở dữ liệu Đồ thị - Neo4j
  db:
    image: neo4j:5-community
    container_name: link_analysis_db
    ports:
      - "7474:7474" # Browser UI của Neo4j
      - "7687:7687" # Port cho Bolt Protocol (API kết nối)
    environment:
      - NEO4J_AUTH=neo4j/password # Setup user/pass mặc định
    volumes:
      - neo4j_data:/data # Lưu trữ dữ liệu vật lý để không mất khi tắt container

  # 2. Backend API - FastAPI
  api:
    build: ./backend
    container_name: link_analysis_api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - db

  # 3. Frontend - ReactJS
  web:
    build: ./frontend
    container_name: link_analysis_web
    ports:
      - "5173:5173" # Port mặc định của Vite
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  neo4j_data: